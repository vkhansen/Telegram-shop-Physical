name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  # Pin ruff so a new release adding lint rules can't silently break CI.
  RUFF_VERSION: "0.15.15"
  # Required env vars for bot module imports
  TOKEN: "test_token_for_ci"
  OWNER_ID: "123456789"
  DATABASE_URL: "sqlite://"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install "ruff==${RUFF_VERSION}"

      - name: Ruff check (lint)
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check --diff .

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-pytz types-python-dateutil

      - name: Run mypy (new modules - strict)
        # --follow-imports=silent scopes strict checking to the listed "new"
        # modules only; without it mypy reports errors across the whole
        # transitively-imported codebase, defeating the per-module strict intent.
        run: |
          mypy \
            bot/payments/promptpay.py \
            bot/utils/currency.py \
            bot/utils/modifiers.py \
            bot/utils/order_status.py \
            bot/utils/order_helpers.py \
            bot/utils/constants.py \
            bot/config/delivery_zones.py \
            --ignore-missing-imports \
            --follow-imports=silent

      - name: Run mypy (full codebase - lenient)
        run: mypy bot/ --ignore-missing-imports --no-strict-optional --allow-untyped-defs
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --tb=short \
            --strict-markers \
            --cov=bot \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-branch \
            -q
        env:
          TOKEN: "test_token_for_ci"
          OWNER_ID: "123456789"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pip-audit safety

      # Advisory-only: these report known CVEs in dependencies but do not fail
      # the build (continue-on-error), so a new upstream advisory can't block
      # unrelated merges. Review the step logs/summary for findings.
      - name: Audit dependencies
        run: pip-audit -r requirements.txt --skip-editable
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: safety check -r requirements.txt --output text
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: telegram-shop-physical:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker image inspect telegram-shop-physical:ci --format '{{.Size}}'
